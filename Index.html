<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Test Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #111, #333);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 40px;
            border-radius: 12px;
            background: rgba(0,0,0,0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .badge {
            margin-top: 20px;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            background: #ff4d00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 It Works!</h1>
        <p>Your GitHub Pages subdomain is successfully set up.</p>
        <div class="badge">Kovai Moto Tribe</div>
    </div>
</body>
</html>
